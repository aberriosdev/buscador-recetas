<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Recetas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

    <header class="bg-light py-5 text-center">
        <div class="container">
            <h1 class="mb-4">Buscador de Recetas</h1>

            <form id="form-busqueda" class="d-flex justify-content-center gap-2">
                <input type="text" id="input-ingrediente" class="form-control w-50"
                    placeholder="Busca por ingrediente..." required>
                <button type="submit" class="btn btn-primary">
                    Buscar
                </button>
            </form>
            <small class="text-muted d-block text-center mt-2">
                * Ingresa el ingrediente en inglés (ej: tomato, rice, cheese)
            </small>
        </div>
    </header>

    <section class="container my-5">
        <div id="resultados" class="row g-4">
            <!-- aquí se renderizan las recetas -->
        </div>
    </section>

    <script src="./assets/js/app.js"></script>
</body>

</html>
