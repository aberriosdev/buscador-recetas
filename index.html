<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Recetas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

    <header class="bg-light py-5 text-center">
        <div class="container">
            <h1 class="mb-4">Buscador de Recetas</h1>

            <form class="d-flex justify-content-center gap-2">
                <input type="text" class="form-control w-50" placeholder="Busca por ingrediente...">
                <button type="button" class="btn btn-primary">
                    Buscar
                </button>
            </form>
        </div>
    </header>

    <section class="container my-5">
        <div class="row g-4">

            <div class="col-lg-4 col-md-6">
                <div class="card h-100">
                    <img src="./assets/img/quinoa.jpg" class="card-img-top" alt="Bowl de Quinoa y Verduras">
                    <div class="card-body">
                        <h5 class="card-title">Bowl de Quinoa y Verduras</h5>
                        <a href="#" class="btn btn-primary">Ver receta</a>
                    </div>
                </div>
            </div>

            <div class="col-lg-4 col-md-6">
                <div class="card h-100">
                    <img src="./assets/img/lasagna.jpg" class="card-img-top" alt="Lasaña Vegetariana">
                    <div class="card-body">
                        <h5 class="card-title">Lasaña Vegetariana</h5>
                        <a href="#" class="btn btn-primary">Ver receta</a>
                    </div>
                </div>
            </div>

            <div class="col-lg-4 col-md-6">
                <div class="card h-100">
                    <img src="./assets/img/ensalada-garbanzos.jpg" class="card-img-top" alt="Ensalada de Garbanzos">
                    <div class="card-body">
                        <h5 class="card-title">Ensalada de Garbanzos</h5>
                        <a href="#" class="btn btn-primary">Ver receta</a>
                    </div>
                </div>
            </div>

            <div class="col-lg-4 col-md-6">
                <div class="card h-100">
                    <img src="./assets/img/curry-lentejas.jpg" class="card-img-top" alt="Curry de Lentejas">
                    <div class="card-body">
                        <h5 class="card-title">Curry de Lentejas</h5>
                        <a href="#" class="btn btn-primary">Ver receta</a>
                    </div>
                </div>
            </div>

            <div class="col-lg-4 col-md-6">
                <div class="card h-100">
                    <img src="./assets/img/hamburguesa-vegetal.jpg" class="card-img-top" alt="Hamburguesa Vegetal">
                    <div class="card-body">
                        <h5 class="card-title">Hamburguesa Vegetal</h5>
                        <a href="#" class="btn btn-primary">Ver receta</a>
                    </div>
                </div>
            </div>

            <div class="col-lg-4 col-md-6">
                <div class="card h-100">
                    <img src="./assets/img/pasta-pesto.jpg" class="card-img-top" alt="Pasta con Pesto y Espinaca">
                    <div class="card-body">
                        <h5 class="card-title">Pasta con Pesto y Espinaca</h5>
                        <a href="#" class="btn btn-primary">Ver receta</a>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <script src="./assets/js/app.js"></script>

</body>

</html>
